<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link id="favicon" rel="icon" type="image/svg+xml" href="/favicon-light.svg" />
    <script>
      const favicon = document.getElementById('favicon');
      const matcher = window.matchMedia('(prefers-color-scheme: dark)');
      const updateFavicon = () => {
        favicon.href = matcher.matches ? '/favicon-dark.svg' : '/favicon-light.svg';
      };
      updateFavicon();
      matcher.addEventListener('change', updateFavicon);
    </script>
    <title>TRUSCOR — Institutional AI Risk Intelligence Platform</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
